name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  tracker:
    name: memecoin tracker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: compile + import smoke
        run: |
          python -m py_compile app/*.py
          python -c "from app import main; assert any(getattr(r, 'path', '') == '/api/paper' for r in main.app.routes)"

  sentinel:
    name: sentinel tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile $(find sentinel -name '*.py')
      - run: pytest -q

  sentinel-web:
    name: sentinel dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel/web/package-lock.json
      - run: npm ci
      - run: npm run build
