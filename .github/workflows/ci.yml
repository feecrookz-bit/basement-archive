name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  tracker:
    name: memecoin tracker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: compile + import smoke
        run: |
          python -m py_compile app/*.py
          python -c "from app import main; assert any(getattr(r, 'path', '') == '/api/paper' for r in main.app.routes)"

  sentinel:
    name: sentinel tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile $(find sentinel -name '*.py')
      - run: pytest -q

  sentinel-web:
    name: sentinel dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel/web/package-lock.json
      - run: npm ci
      - run: npm run build

  sentinel-e2e:
    name: sentinel e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel
      DASHBOARD_PASSWORD: e2e-pass
      SESSION_SECRET: e2e-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel/web/package-lock.json
      - run: pip install -r requirements.txt
        working-directory: sentinel
      - name: seed demo data
        run: python scripts/seed_demo.py
        working-directory: sentinel
      - name: start api
        run: |
          nohup python -m uvicorn sentinel.api:app --port 8080 > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && break; sleep 1; done
        working-directory: sentinel
      - name: build + start dashboard
        run: |
          npm ci
          npm run build
          nohup npx next start -p 3000 > /tmp/web.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/login && break; sleep 1; done
        working-directory: sentinel/web
      - name: run playwright specs
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test
        working-directory: sentinel/e2e
      - name: dump service logs on failure
        if: failure()
        run: tail -50 /tmp/api.log /tmp/web.log || true
