services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    restart: unless-stopped
    build: .
    command: uvicorn sentinel.api:app --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    restart: unless-stopped
    build: .
    command: python -m sentinel run
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    restart: unless-stopped
    build: ./web
    ports:
      - "3000:3000"
    environment:
      # server-side target for the /api/* rewrite proxy + RSC fetches;
      # the browser itself only ever talks to this web origin
      API_INTERNAL_URL: http://api:8080
    depends_on:
      - api

volumes:
  pgdata:
